<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #dc2626; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background-color: #b91c1c; }
        .transcript-box { text-align: left; background: white; padding: 20px; border-radius: 8px; margin-top: 20px; max-height: 400px; overflow-y: auto; border: 1px solid #ccc; }
        .hidden { display: none; }
        .loading { color: #6b7280; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 YouTube Transcript Generator</h1>
        <p>Paste a YouTube URL to get the transcript instantly.</p>
        
        <input type="text" id="youtubeUrl" placeholder="Paste YouTube link here...">
        <button onclick="getTranscript()">Get Transcript</button>
        
        <div id="loading" class="loading hidden">Fetching transcript... Please wait.</div>
        <div id="error" class="loading hidden" style="color: red;"></div>
        
        <div id="result" class="transcript-box hidden"></div>
        <button id="copyBtn" class="hidden" style="margin-top: 15px; background-color: #2563eb;" onclick="copyText()">Copy Transcript</button>
    </div>

    <script>
        async function getTranscript() {
            const url = document.getElementById('youtubeUrl').value;
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const result = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');

            // Reset UI
            loading.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            result.classList.add('hidden');
            copyBtn.classList.add('hidden');

            if (!url) {
                errorDiv.innerText = "Please enter a URL.";
                errorDiv.classList.remove('hidden');
                loading.classList.add('hidden');
                return;
            }

            try {
                // Call our serverless function
                const response = await fetch(`/api/transcript?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Show transcript
                result.innerHTML = data.transcript.map(item => 
                    `<div style="margin-bottom: 10px;"><strong>[${Math.floor(item.start / 60)}:${String(Math.floor(item.start % 60)).padStart(2, '0')}]</strong> ${item.text}</div>`
                ).join('');
                
                result.classList.remove('hidden');
                copyBtn.classList.remove('hidden');
            } catch (err) {
                errorDiv.innerText = "Error: " + err.message + ". Make sure the video has subtitles.";
                errorDiv.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function copyText() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard!");
            });
        }
    </script>
</body>
</html>
